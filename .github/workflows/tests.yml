name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import is side-effect free (no heavy deps at import)
        run: python -c "import sys, DNScanner; assert 'dns' not in sys.modules; print('import ok', DNScanner.__version__)"
      - name: Run unit tests (offline; mocked resolvers)
        run: python -m unittest discover -s tests -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile the package
        run: python -m compileall -q DNScanner start.py menu.py setup.py
      - name: Ruff (advisory)
        run: |
          pip install ruff
          ruff check DNScanner || true
